proxies:
  - name: "NO-PROXY"
    type: direct
    udp: true

proxy-groups:
  - name: "GLOBAL"
    type: select
    proxies:
      - "NO-PROXY"

dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  ipv6: false
  nameserver:
    - 223.5.5.5
  hosts:
    '19q.cc': 104.21.9.199

rules:
  - MATCH,GLOBAL
